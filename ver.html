<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento — Printer & Co.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; background: #F0F0F0; min-height: 100vh; padding: 1.5rem 1rem; color: #111; }
  .card { max-width: 680px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  /* HEADER */
  .hdr { background: #111; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
  .hdr img { height: 60px; width: auto; }
  .hdr-right { text-align: right; }
  .doc-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #E91E8C; margin-bottom: 4px; }
  .doc-title { font-size: 28px; font-weight: 700; color: white; letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.9; }
  .meta strong { color: rgba(255,255,255,0.8); }

  /* BODY */
  .body { padding: 1.75rem 2rem; }
  .client-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #EEE; margin-bottom: 1.5rem; }
  .cf-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 4px; }
  .cf-val { font-size: 13px; font-weight: 600; color: #111; }
  .ref-row { font-size: 12px; color: #555; padding-bottom: 1.25rem; border-bottom: 1px solid #EEE; margin-bottom: 1.5rem; }
  .ref-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 4px; }

  /* TABELA */
  .sec-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: #AAA; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #EEE; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  thead th { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #AAA; padding: 8px 10px; border-bottom: 2px solid #111; text-align: left; }
  thead th:not(:first-child) { text-align: right; }
  thead th:nth-child(2) { text-align: center; }
  tbody tr:nth-child(even) { background: #F9F9F9; }
  tbody td { font-size: 13px; color: #111; padding: 9px 10px; border-bottom: 1px solid #EEE; }
  tbody td:not(:first-child) { text-align: right; }
  tbody td:nth-child(2) { text-align: center; }
  tbody td:last-child { font-weight: 700; }

  /* TOTAIS */
  .totals { display: flex; justify-content: flex-end; margin-top: 0.5rem; }
  .totals-inner { width: 240px; }
  .tot-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; padding: 4px 0; }
  .tot-row span:last-child { color: #111; font-weight: 500; }
  .tot-disc span:last-child { color: #E24B4A; }
  .tot-final { display: flex; justify-content: space-between; padding-top: 10px; margin-top: 6px; border-top: 2px solid #111; }
  .tot-final .lbl { font-size: 12px; font-weight: 700; color: #111; }
  .tot-final .val { font-size: 20px; font-weight: 700; color: #E91E8C; }

  /* OBS */
  .obs-block { margin-top: 1.5rem; padding: 12px 16px; border-left: 3px solid #E91E8C; background: #FDF5F9; border-radius: 0 6px 6px 0; }
  .obs-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #AAA; margin-bottom: 6px; }
  .obs-text { font-size: 12px; color: #444; line-height: 1.7; white-space: pre-wrap; }

  /* FOOTER */
  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #EEE; display: flex; justify-content: space-between; font-size: 10px; color: #AAA; flex-wrap: wrap; gap: 4px; }

  /* VAZIO */
  .empty { text-align: center; padding: 3rem 1rem; color: #AAA; }
  .empty h2 { font-size: 18px; margin-bottom: 8px; color: #CCC; }

  .btn-salvar {
    display: block; margin: 1.5rem auto 0;
    background: #111; color: white; border: none;
    border-radius: 8px; height: 46px; padding: 0 28px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: Arial, Helvetica, sans-serif;
    transition: background .15s;
  }
  .btn-salvar:hover { background: #E91E8C; }
  .btn-rodape { text-align: center; padding: 1.5rem 2rem 2rem; border-top: 1px solid #EEE; }
  @media (max-width: 480px) {
    .hdr { padding: 1rem; flex-direction: row; }
    .hdr img { height: 44px; }
    .doc-title { font-size: 20px; }
    .body { padding: 1.25rem 1rem; }
    .client-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
    .client-grid > div:last-child { grid-column: 1 / -1; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<div class="card" id="cardOrc">
  <div class="empty" id="emptyState">
    <h2>Nenhum orçamento encontrado</h2>
    <p>Este link pode estar incorreto ou expirado.</p>
  </div>
  <div class="btn-rodape" id="btnRodape" style="display:none">
    <button class="btn-salvar" id="btnSalvarPDF">
      Salvar PDF
    </button>
  </div>
</div>

  function fmt(v) {
    return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    var p = iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
  }

  var hash = window.location.hash;
  if (!hash || hash.indexOf('#orc=') !== 0) return;

  try {
    var raw = hash.replace('#orc=', '').replace('#', '');
    var parsed = JSON.parse(decodeURIComponent(escape(atob(raw))));
    var d;
    if (Array.isArray(parsed)) {
      d = {
        c: parsed[0], cc: parsed[1], r: parsed[2], v: parsed[3],
        dv: parsed[4], dt: parsed[5],
        it: (parsed[6]||[]).map(function(i){ return {d:i[0],q:i[1],u:i[2]}; }),
        en: parsed[7]||'', ec: parsed[8]||''
      };
    } else {
      d = parsed;
      if (!d.it) { d.it = []; }
      if (d.it.length && Array.isArray(d.it[0])) {
        d.it = d.it.map(function(i){ return {d:i[0],q:i[1],u:i[2]}; });
      }
    }

    var sub = 0;
    var itensRows = '';
    (d.it || []).forEach(function(item, i) {
      var tot = (item.q || 0) * (item.u || 0);
      sub += tot;
      var bg = i % 2 === 1 ? 'background:#F9F9F9' : '';
      itensRows += '<tr style="' + bg + '">'
        + '<td>' + (item.d || '—') + '</td>'
        + '<td style="text-align:center">' + (item.q || 0) + '</td>'
        + '<td style="text-align:right">' + fmt(item.u || 0) + '</td>'
        + '<td style="text-align:right;font-weight:700">' + fmt(tot) + '</td>'
        + '</tr>';
    });

    var discVal   = d.dv || 0;
    var discReais = d.dt === 'pct' ? (sub * discVal / 100) : discVal;
    var total     = Math.max(0, sub - discReais);

    var discRow = '';
    if (discReais > 0) {
      var dl = d.dt === 'pct' ? discVal.toFixed(1) + '%' : fmt(discReais);
      discRow = '<div class="tot-row tot-disc"><span>Desconto (' + dl + ')</span><span>− ' + fmt(discReais) + '</span></div>';
    }

    var obsBlock = d.o ? '<div class="obs-block"><div class="obs-label">Observações</div><div class="obs-text">' + d.o + '</div></div>' : '';
    var refBlock = d.r ? '<div class="ref-row"><div class="ref-label">Referência</div>' + d.r + '</div>' : '';

    var footer1 = (d.en || '') + (d.ec ? ' · CNPJ: ' + d.ec : '') + (d.ea ? ' · ' + d.ea : '');
    var footer2 = (d.et || '') + (d.ee ? (d.et ? ' · ' : '') + d.ee : '');

    document.getElementById('cardOrc').innerHTML =
      '<div class="hdr">'
        + '<img src="' + LOGO + '" alt="Printer &amp; Co.">'
        + '<div class="hdr-right">'
          + '<div class="doc-label">Documento Comercial</div>'
          + '<div class="doc-title">Orçamento</div>'
          + '<div class="meta">'
            + '<div><strong>Emissão</strong> &nbsp;' + new Date().toLocaleDateString('pt-BR') + '</div>'
            + '<div><strong>Validade</strong> &nbsp;' + fmtDate(d.v) + '</div>'
            + (d.r ? '<div><strong>Ref.</strong> &nbsp;' + d.r + '</div>' : '')
          + '</div>'
        + '</div>'
      + '</div>'
      + '<div class="body">'
        + '<div class="client-grid">'
          + '<div><div class="cf-label">Cliente</div><div class="cf-val">' + (d.c || '—') + '</div></div>'
          + '<div><div class="cf-label">CNPJ / CPF</div><div class="cf-val">' + (d.cc || '—') + '</div></div>'
          + '<div style="text-align:right"><div class="cf-label">Emitido por</div><div class="cf-val" style="font-size:12px">' + (d.en || 'Printer &amp; Co.') + (d.ec ? '<br><span style="font-size:10px;color:#888;font-weight:400">' + d.ec + '</span>' : '') + '</div></div>'
        + '</div>'
        + '<div class="sec-label">Itens do orçamento</div>'
        + '<table><thead><tr>'
          + '<th style="width:50%">Descrição</th>'
          + '<th style="width:8%;text-align:center">Qtd.</th>'
          + '<th style="width:20%">Val. unitário</th>'
          + '<th style="width:20%">Total</th>'
        + '</tr></thead><tbody>' + itensRows + '</tbody></table>'
        + '<div class="totals"><div class="totals-inner">'
          + '<div class="tot-row"><span>Subtotal</span><span>' + fmt(sub) + '</span></div>'
          + discRow
          + '<div class="tot-final"><span class="lbl">Total</span><span class="val">' + fmt(total) + '</span></div>'
        + '</div></div>'
        + obsBlock
        + '<div class="footer"><div>' + footer1 + '</div><div>' + footer2 + '</div></div>'
      + '</div>';

  } catch(e) {
    console.log('Erro ao carregar orçamento:', e);
    return;
  }

    function fmt2(v) { return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(150,150,150);
    doc.text('DESCRICAO',ml,y); doc.text('QTD.',ml+cw*0.62,y,{align:'center'});
    doc.text('VAL. UNITARIO',ml+cw*0.80,y,{align:'right'}); doc.text('TOTAL',pw-mr,y,{align:'right'});
    y+=3; doc.setDrawColor(17,17,17); doc.setLineWidth(0.5); doc.line(ml,y,pw-mr,y); y+=6;
    doc.setLineWidth(0.2); doc.setDrawColor(220,220,220);
    var sub2=0;
    (d.it||[]).forEach(function(item,i) {
      if (i%2===1) { doc.setFillColor(249,249,249); doc.rect(ml,y-4,cw,8,'F'); }
      doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(17,17,17);
      var dt2=item.d&&item.d.length>55?item.d.substring(0,52)+'...':item.d||'—';
      var tot2=(item.q||0)*(item.u||0); sub2+=tot2;
      doc.text(dt2,ml,y); doc.text(String(item.q||0),ml+cw*0.62,y,{align:'center'});
      doc.text(fmt2(item.u||0),ml+cw*0.80,y,{align:'right'});
      doc.setFont('helvetica','bold'); doc.text(fmt2(tot2),pw-mr,y,{align:'right'});
      doc.line(ml,y+3,pw-mr,y+3); y+=9;
    });
    y+=6;
    var discR2=(d.dt==='pct')?(sub2*(d.dv||0)/100):(d.dv||0);
    var tot3=Math.max(0,sub2-discR2);
    var totX=pw-mr-70;
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(120,120,120);
    doc.text('Subtotal',totX,y); doc.setTextColor(17,17,17); doc.text(fmt2(sub2),pw-mr,y,{align:'right'}); y+=6;
    if (discR2>0) { doc.setTextColor(180,60,60); doc.text('Desconto',totX,y); doc.text('- '+fmt2(discR2),pw-mr,y,{align:'right'}); y+=6; }
    doc.setDrawColor(17,17,17); doc.setLineWidth(0.5); doc.line(totX,y,pw-mr,y); y+=7;
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.setTextColor(17,17,17); doc.text('Total',totX,y);
    doc.setTextColor(233,30,140); doc.text(fmt2(tot3),pw-mr,y,{align:'right'}); y+=12;
    if (d.o) { doc.setDrawColor(233,30,140); doc.setLineWidth(1); doc.line(ml,y,ml,y+16); doc.setLineWidth(0.2); doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(150,150,150); doc.text('OBSERVACOES',ml+4,y+4); doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60); var oL=doc.splitTextToSize(d.o,cw-8); doc.text(oL,ml+4,y+10); }
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.3); doc.line(ml,ph-18,pw-mr,ph-18);
    doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(150,150,150);
    var f1=(d.en||'')+(d.ec?'   |   CNPJ: '+d.ec:'');
    doc.text(f1,ml,ph-12);

    var nomeArq = 'PRINTER & CO - Orcamento.pdf';
    if (window.showSaveFilePicker) {
      var blob = doc.output('blob');
      window.showSaveFilePicker({ suggestedName: nomeArq, types: [{ description: 'PDF', accept: { 'application/pdf': ['.pdf'] } }] })
        .then(function(fh) { fh.createWritable().then(function(w) { w.write(blob).then(function() { w.close(); }); }); })
        .catch(function() { doc.save(nomeArq); });
    } else { doc.save(nomeArq); }
  });
})();
</script>
